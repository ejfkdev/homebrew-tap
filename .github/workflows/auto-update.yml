name: Auto-update formulae

on:
  schedule:
    - cron: "0 3 * * *" # daily at 03:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        formula:
          - { name: dj, repo: ejfkdev/dj }
          - { name: udf, repo: ejfkdev/udf }
          - { name: apix, repo: ejfkdev/apix }
          - { name: tspc, repo: ejfkdev/typespec-rs }
          - { name: vcc, repo: ejfkdev/vcc-cli }
          - { name: zaip, repo: ejfkdev/zaip }
          - { name: saw, repo: ejfkdev/ShellAnyWhere }
    steps:
      - uses: actions/checkout@v4

      - name: Update formula
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 update_formula.py "${{ matrix.formula.name }}" "${{ matrix.formula.repo }}"

      - name: Verify Ruby syntax
        run: ruby -c "Formula/${{ matrix.formula.name }}.rb"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet Formula/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create and merge PR
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "auto-update ${{ matrix.formula.name }}"
          title: "auto-update ${{ matrix.formula.name }}"
          branch: auto-update-${{ matrix.formula.name }}
          delete-branch: true

      - name: Merge PR
        if: steps.changes.outputs.changed == 'true'
        run: |
          PR_NUMBER=$(gh pr list --head "auto-update-${{ matrix.formula.name }}" --state open --json number --jq '.[0].number')
          if [ -n "$PR_NUMBER" ]; then
            gh pr merge "$PR_NUMBER" --squash --admin
            echo "Merged PR #$PR_NUMBER"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
